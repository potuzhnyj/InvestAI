<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circle background (GitHub-style) -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Falling rain of dollar signs and tickers — scattered, different sizes/opacities -->
  <g clip-path="url(#circle-clip)" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" fill="#FFFBF1">
    <!-- Rain column 1 -->
    <text x="52" y="60" font-size="16" opacity="0.08">AAPL</text>
    <text x="60" y="110" font-size="22" opacity="0.12">$</text>
    <text x="45" y="170" font-size="14" opacity="0.06">VOO</text>
    <text x="55" y="230" font-size="20" opacity="0.10">$</text>
    <text x="48" y="310" font-size="13" opacity="0.05">NVDA</text>
    <text x="62" y="370" font-size="18" opacity="0.08">$</text>
    <text x="50" y="440" font-size="15" opacity="0.06">AMD</text>

    <!-- Rain column 2 -->
    <text x="120" y="40" font-size="18" opacity="0.10">$</text>
    <text x="110" y="100" font-size="14" opacity="0.07">MSFT</text>
    <text x="125" y="160" font-size="24" opacity="0.09">$</text>
    <text x="115" y="235" font-size="12" opacity="0.05">GOOG</text>
    <text x="122" y="340" font-size="16" opacity="0.07">$</text>
    <text x="108" y="420" font-size="13" opacity="0.06">META</text>
    <text x="128" y="480" font-size="20" opacity="0.08">$</text>

    <!-- Rain column 3 -->
    <text x="190" y="75" font-size="13" opacity="0.06">AMZN</text>
    <text x="195" y="145" font-size="20" opacity="0.10">$</text>
    <text x="185" y="210" font-size="15" opacity="0.07">TSLA</text>
    <text x="200" y="290" font-size="18" opacity="0.05">$</text>
    <text x="188" y="385" font-size="11" opacity="0.06">SAP</text>
    <text x="198" y="460" font-size="22" opacity="0.08">$</text>

    <!-- Rain column 4 (behind the main symbol) -->
    <text x="265" y="50" font-size="14" opacity="0.07">JPM</text>
    <text x="258" y="120" font-size="20" opacity="0.06">$</text>
    <text x="270" y="420" font-size="16" opacity="0.06">$</text>
    <text x="260" y="480" font-size="12" opacity="0.05">ASML</text>

    <!-- Rain column 5 -->
    <text x="330" y="45" font-size="18" opacity="0.09">$</text>
    <text x="320" y="105" font-size="13" opacity="0.06">RACE</text>
    <text x="335" y="180" font-size="22" opacity="0.07">$</text>
    <text x="325" y="390" font-size="14" opacity="0.06">GLD</text>
    <text x="338" y="460" font-size="20" opacity="0.08">$</text>

    <!-- Rain column 6 -->
    <text x="395" y="70" font-size="12" opacity="0.05">CRWD</text>
    <text x="405" y="140" font-size="20" opacity="0.10">$</text>
    <text x="390" y="210" font-size="15" opacity="0.06">PLTR</text>
    <text x="400" y="280" font-size="18" opacity="0.08">$</text>
    <text x="392" y="370" font-size="13" opacity="0.05">ORCL</text>
    <text x="408" y="440" font-size="22" opacity="0.07">$</text>

    <!-- Rain column 7 -->
    <text x="448" y="55" font-size="16" opacity="0.08">$</text>
    <text x="440" y="130" font-size="11" opacity="0.05">SONY</text>
    <text x="455" y="200" font-size="20" opacity="0.06">$</text>
    <text x="442" y="320" font-size="14" opacity="0.07">TTWO</text>
    <text x="450" y="400" font-size="18" opacity="0.09">$</text>
    <text x="445" y="475" font-size="12" opacity="0.05">NET</text>
  </g>

  <!-- Main dollar sign — bold, centered, dominant -->
  <text x="256" y="280" text-anchor="middle" dominant-baseline="central"
    font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="800" font-size="280" fill="#FFFBF1" opacity="0.95">$</text>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="250" stroke="#FFFBF1" stroke-width="2" fill="none" opacity="0.06"/>
</svg>
